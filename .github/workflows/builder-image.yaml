name: Builder base image

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'Dockerfile'
      - '.gemrc.prod'

env:
  REGISTRY: quay.io
  IMAGE_NAME: "cloudservices/compliance-backend"

jobs:
  build:
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}"
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@3864d6aed8ff134b2ed894ce00c87695c709c870
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_CLOUDSERVICES_USERNAME }}
          password: ${{ secrets.QUAY_CLOUDSERVICES_PASSWORD }}

      - name: Build and push builder image
        uses: docker/build-push-action@ff26911fd365b0233252dfbd8eede1c0e9ef9a51
        with:
          platforms: linux/amd64
          context: .
          file: ./Dockerfile
          target: build
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:builder
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder
